name: OnlineJobs Radar

on:
  schedule:
    - cron: '*/30 * * * *' # Fires every 30 minutes automatically
  workflow_dispatch: # Gives you a manual "Run" button to test it

jobs:
  scrape-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Fire the Scraper
        run: node scraper.js
