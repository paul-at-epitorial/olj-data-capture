name: OnlineJobs Radar

on:
  schedule:
    - cron: '*/30 * * * *' # Fires every 30 minutes automatically
  workflow_dispatch: # Gives you a manual "Run" button to test it

# 1. Add this env block right here to force the new runner
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape-jobs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '24' # 2. Update this from 20 to 24
          
      - run: npm install
      - run: node scraper.js
